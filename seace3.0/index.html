<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Premium Design</title>
  <link rel="stylesheet" href="styles.css?v=46">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet">
</head>

<body>
  <div class="bg-blur-overlay"></div>
  <div class="snow-bg"></div>

  <header class="top-header">
    <div class="logo header-logo-left">
      <img src="mqs-logo.jpg" alt="MQS Logo" class="brand-image">
    </div>
    <div class="logo header-logo-right">
      <img src="jcq-logo.jpg" alt="JCQ Logo" class="brand-image">
    </div>
  </header>

  <main class="login-card">
    <div class="shine-overlay"></div>

    <div class="left-panel">
      <!-- Decorative Shapes (Parallax) -->
      <div class="decor-circle shape-1"></div>
      <div class="decor-circle shape-2"></div>
      <div class="decor-circle shape-3"></div>
      <div class="decor-circle shape-4"></div>
      <div class="decor-circle shape-5"></div>
      <div class="decor-circle shape-6"></div>
      <div class="decor-circle shape-7"></div>
      <div class="decor-circle shape-8"></div>
      <div class="decor-circle shape-9"></div>
      <div class="decor-circle shape-10"></div>
      <div class="decor-circle shape-11"></div>
      <div class="decor-circle shape-12"></div>
      <div class="decor-circle shape-13"></div>
      <div class="decor-circle shape-14"></div>
      <div class="decor-circle shape-15"></div>
      <div class="decor-circle shape-16"></div>
      <div class="decor-circle shape-17"></div>
      <div class="decor-circle shape-18"></div>
      <div class="decor-circle shape-19"></div>
      <div class="decor-circle shape-20"></div>
      <div class="decor-circle shape-21"></div>
      <div class="decor-circle shape-22"></div>
      <div class="decor-circle shape-23"></div>
      <div class="decor-circle shape-24"></div>

      <div class="left-content">
        <div class="branding-group">
          <h1 class="reveal-text">MCQS</h1>
          <h2 class="main-names animate-stagger" style="animation-delay: 0.2s;">
            <span>MICHAEL</span>
            <span>CESAR</span>
            <span>QUISPE</span>
            <span>SEBASTIA</span>
          </h2>
        </div>
        <div class="slogan-group">
          <h3 class="animate-stagger" style="animation-delay: 0.4s;">ANTICIPAR ES GANAR</h3>
          <p class="animate-stagger" style="animation-delay: 0.6s;">CUMPLIR ES CRECER</p>
        </div>
      </div>
    </div>

    <div class="right-panel">
      <div class="form-wrapper">
        <h2 class="form-title animate-stagger" style="animation-delay: 0.6s;">Iniciar sesión</h2>
        <p class="form-subtitle animate-stagger" style="animation-delay: 0.7s;">Bienvenido de nuevo, por favor ingrese sus credenciales de acceso.</p>

        <form id="loginForm">
          <!-- Username -->
          <div class="input-group animate-stagger" style="animation-delay: 0.8s;">
            <div class="icon-wrapper">
              <svg fill="currentColor" viewBox="0 0 20 20">
                <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd">
                </path>
              </svg>
            </div>
            <input type="text" id="username" placeholder=" " required>
            <label for="username">Usuario</label>
          </div>

          <!-- Password -->
          <div class="input-group animate-stagger" style="animation-delay: 0.9s;">
            <div class="icon-wrapper">
              <svg fill="currentColor" viewBox="0 0 20 20">
                <path fill-rule="evenodd"
                  d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z"
                  clip-rule="evenodd"></path>
              </svg>
            </div>
            <input type="password" id="password" placeholder=" " required>
            <label for="password">Contraseña</label>
            <button type="button" class="btn-show" id="showPwdBtn">VER</button>
          </div>

          <div class="form-options animate-stagger" style="animation-delay: 1.0s;">
            <label class="remember-me">
              <input type="checkbox">
              <span class="custom-checkbox"></span>
              <span class="label-text">Recordarme</span>
            </label>
            <a href="#" class="forgot-pwd underline-anim">¿Olvidó su contraseña?</a>
          </div>

          <div class="button-magnetic-area">
            <button type="submit" class="btn-primary animate-stagger btn-magnetic" id="submitBtn"
              style="animation-delay: 1.1s;">Ingresar</button>
          </div>

          <div class="divider animate-stagger" style="animation-delay: 1.2s;">
            <div class="line"></div>
            <span>o</span>
            <div class="line"></div>
          </div>

          <button type="button" class="btn-secondary animate-stagger" style="animation-delay: 1.3s;">Ingresar con otro método</button>

          <p class="signup-text animate-stagger" style="animation-delay: 1.4s;">
            ¿No tienes una cuenta? <a href="#" class="underline-anim">Regístrate</a>
          </p>
        </form>
      </div>
    </div>
  </main>

  <div class="snow-fg"></div>

  <script src="script.js"></script>
</body>

</html>
